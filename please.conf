# /etc/please.conf
# must be owned by root and not writable by group/other, or please
# will refuse to load it.
#
# syntax:
#   permit|deny [nopass] <user|:group> [cmd <path> [arg1 arg2 ...]]
#
# - ident is either a bare username or ":groupname"
# - cmd path must be absolute; it's matched against the fully resolved
#   path of the command being run (symlinks and $PATH search included)
# - if "cmd" is given with no trailing args, any arguments are allowed
# - if "cmd" is given with trailing args, the arguments must match exactly
# - rules are evaluated top to bottom; the LAST matching rule wins
# - if nothing matches, the request is denied
#
# examples:

# members of the "please" group may run anything as root, with a password
permit :please

# retucio (me lmfao) may reboot and shutdown without being asked for a password
permit nopass retucio cmd /usr/sbin/reboot
permit nopass retucio cmd /usr/bin/shutdown

# even members of "please" may never use this to reset root's own password
deny :please cmd /usr/bin/passwd root
